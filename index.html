<!DOCTYPE html>
<html>
<head>
    <title>Profile App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* ===== FIXED IMAGE STYLE ===== */
        .profile-image-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            background: white;
        }

        .profile-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;   /* FIX stretch */
            object-position: center;
            display: block;
        }

        .profile h3 {
            margin-bottom: 10px;
        }

        .profile p {
            margin: 5px 0;
            opacity: 0.9;
        }

    </style>
</head>
<body>

<!-- INPUT PAGE -->
<div class="container" id="inputPage">
    <h2>Enter Profile</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="status" placeholder="Enter Status (Single)">
    <input type="number" id="age" placeholder="Enter Age">
    <input type="text" id="section" placeholder="Enter Section (BSIT 2A)">
    <input type="file" id="image" accept="image/*">

    <button onclick="showProfile()">Submit Profile</button>
</div>

<!-- OUTPUT PAGE -->
<div class="container profile" id="outputPage" style="display:none;">
    <h2>Profile</h2>

    <div class="profile-image-container">
        <img id="profileImage" 
        src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
    </div>

    <h3 id="profileName"></h3>
    <p id="profileStatus"></p>
    <p id="profileAge"></p>
    <p id="profileSection"></p>

    <button onclick="goBack()">Back</button>
</div>

<script>
function showProfile() {

    let name = document.getElementById("name").value;
    let status = document.getElementById("status").value;
    let age = document.getElementById("age").value;
    let section = document.getElementById("section").value;
    let imageInput = document.getElementById("image");

    if(name === "" || status === "" || age === "" || section === "") {
        alert("Please complete all fields!");
        return;
    }

    document.getElementById("profileName").innerText = name;
    document.getElementById("profileStatus").innerText = status;
    document.getElementById("profileAge").innerText = "Age: " + age;
    document.getElementById("profileSection").innerText = section;

    if(imageInput.files && imageInput.files[0]) {
        let reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("profileImage").src = e.target.result;
        };
        reader.readAsDataURL(imageInput.files[0]);
    }

    document.getElementById("inputPage").style.display = "none";
    document.getElementById("outputPage").style.display = "block";
}

function goBack() {
    document.getElementById("outputPage").style.display = "none";
    document.getElementById("inputPage").style.display = "block";
}
</script>

</body>
    </html>
